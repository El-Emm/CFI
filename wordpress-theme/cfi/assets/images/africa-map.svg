<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" role="img" aria-label="Map of Africa highlighting countries served by CharityFaith International">
  <rect width="520" height="560" fill="#FFF8F1" rx="12"/>
  <!-- Africa continent base -->
  <path class="cfi-map-africa-base" fill="#e8e4df" stroke="#d8d4cf" stroke-width="1"
    d="M 118 118 C 132 96 168 82 206 88 C 238 72 276 78 302 96 C 334 88 372 96 396 118 C 418 108 442 118 452 142
       C 468 156 478 184 472 212 C 488 238 492 268 484 298 C 496 328 490 362 472 388 C 478 418 464 448 438 468
       C 418 492 388 504 356 498 C 328 512 292 518 258 508 C 228 518 194 512 168 494 C 142 478 124 452 118 422
       C 102 392 96 358 104 324 C 92 294 94 260 108 232 C 98 204 102 172 118 148 Z"/>
  <!-- Niger Republic -->
  <path class="cfi-map-country" data-country="niger" tabindex="0" role="button" aria-label="Niger Republic" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 228 168 L 278 158 L 292 188 L 286 218 L 248 224 L 222 202 Z"/>
  <!-- Nigeria -->
  <path class="cfi-map-country" data-country="nigeria" tabindex="0" role="button" aria-label="Nigeria" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 236 222 L 286 214 L 304 242 L 296 276 L 262 286 L 232 268 L 224 242 Z"/>
  <!-- Malawi -->
  <path class="cfi-map-country" data-country="malawi" tabindex="0" role="button" aria-label="Malawi" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 358 318 L 372 312 L 378 352 L 366 368 L 352 358 Z"/>
  <!-- Zimbabwe -->
  <path class="cfi-map-country" data-country="zimbabwe" tabindex="0" role="button" aria-label="Zimbabwe" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 322 352 L 352 346 L 360 372 L 348 388 L 318 382 Z"/>
  <!-- Botswana -->
  <path class="cfi-map-country" data-country="botswana" tabindex="0" role="button" aria-label="Botswana" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 288 388 L 318 382 L 324 412 L 298 420 L 282 408 Z"/>
  <!-- Namibia -->
  <path class="cfi-map-country" data-country="namibia" tabindex="0" role="button" aria-label="Namibia" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 248 378 L 282 368 L 288 418 L 262 428 L 242 412 Z"/>
  <!-- South Africa -->
  <path class="cfi-map-country" data-country="south-africa" tabindex="0" role="button" aria-label="South Africa" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 268 428 L 332 418 L 348 462 L 318 488 L 278 482 L 258 452 Z"/>
  <!-- Lesotho -->
  <path class="cfi-map-country" data-country="lesotho" tabindex="0" role="button" aria-label="Lesotho" fill="#FF6A00" stroke="#fff" stroke-width="1.5"
    d="M 302 452 L 314 448 L 318 462 L 306 466 Z"/>
  <!-- Philippines inset -->
  <g class="cfi-map-philippines" transform="translate(392, 48)">
    <rect x="0" y="0" width="108" height="72" rx="8" fill="#fff" stroke="#e8e4df"/>
    <text x="54" y="18" text-anchor="middle" fill="#5F5F5F" font-size="11" font-family="Source Sans 3, sans-serif">Asia Pacific</text>
    <path class="cfi-map-country" data-country="philippines" tabindex="0" role="button" aria-label="The Philippines" fill="#FF6A00" stroke="#fff" stroke-width="1.2"
      d="M 28 38 L 42 30 L 58 34 L 72 42 L 78 54 L 64 58 L 48 52 L 34 48 Z"/>
    <text x="54" y="66" text-anchor="middle" fill="#111" font-size="10" font-family="Source Sans 3, sans-serif">Philippines</text>
  </g>
  <text x="260" y="36" text-anchor="middle" fill="#5F5F5F" font-size="13" font-family="Source Sans 3, sans-serif">Click a highlighted country to explore our field work</text>
</svg>
